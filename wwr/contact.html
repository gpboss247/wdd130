<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Rafting Mountain Company</title>
    <link rel="stylesheet" href="styles/rafting.css">
    <meta name="description"
      content="Contact our Rafting Company for reservations, inquiries, or assistance. Reach out today and start planning your next adventure.">
    <meta name="author" content="Onaimor Godspower">
</head>

<body>

    <header>
        <img src="images/kayak_logo.png" alt="Rafting site Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="company-info">
            <h1>Rafting Mountain Company</h1>
            <p>123 Main River Street</p>
            <p>Lakeside, California</p>
            <p>+1 746 298 3472</p>
            <p>info@raftingmountain.com</p>
        </section>

        <div class="contact-container">

            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d11236.958098553196!2d-116.93273769920944!3d32.858343641581136!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1s123%20River%20Street%2C%20Lakeside%2C%20CA%2C%20USA!5e0!3m2!1sen!2sng!4v1775129772874!5m2!1sen!2sng"
                  width="400" height="300" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

            <form class="contact-form">
                <label for="name">Name</label>
                <input type="text" name="name" id="name" placeholder="Your Name" required>

                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" placeholder="Your Email" required>

                <fieldset>
                    <legend>Message Purpose</legend>
                    <label for="general">General Inquiry</label>
                    <input type="radio" name="purpose" id="general" value="general" required>

                    <label for="reservation">Reservation Question</label>
                    <input type="radio" name="purpose" id="reservation" value="reservation">

                    <label for="suggestion">Website Suggestion</label>
                    <input type="radio" name="purpose" id="suggestion" value="suggestion">

                </fieldset>

                <label for="message">Message</label>
                <textarea name="message" id="message" placeholder="Type here...."
                  required></textarea>

                <label for="subscribe" class="checkbox">Please subscribe me to the monthly
                    newsletter</label>
                <input type="checkbox" name="subscribe" id="subscribe">

                <button type="submit">Get in Touch!</button>
            </form>
        </div>

        <section class="employees">
            <h2>We Are Here To Serve You</h2>

            <div class="employee-profiles">
                <figure>
                    <img src="images/employee_1.jpg" alt="Jane - Manager">
                    <figcaption>Jane - Operations Manager</figcaption>
                </figure>

                <figure>
                    <img src="images/employee_2.jpg" alt="Roland - River Guide">
                    <figcaption>Roland - Senior River Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employee_4.jpg" alt="Mike - Instructor">
                    <figcaption>Mike - Safety Instructor</figcaption>
                </figure>

                <figure>
                    <img src="images/employee_3.jpg" alt="Sarah - Logistics">
                    <figcaption>Sarah - Logistics Manager</figcaption>
                </figure>
            </div>
        </section>

    </main>

    <footer>
        <p> &copy; 2026 Rafting Mountain Company | Onaimor Godspower</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook_small.png" alt="facebook icon">
            </a>

            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="linkedin icon">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram_small.png" alt="instagram icon">
            </a>
        </nav>
    </footer>

</body>

</html>
